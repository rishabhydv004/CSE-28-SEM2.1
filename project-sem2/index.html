<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">

<div class="logo">
amazon<span>.in</span>
</div>

<div class="searchBox">

<select id="categorySelect">
<option>All</option>
<option>Mobiles</option>
<option>Electronics</option>
<option>Computers</option>
<option>Fashion</option>
<option>Home</option>
</select>

<input
type="text"
id="searchInput"
placeholder="Search products..."
>

<button onclick="searchProducts()">
Search
</button>

</div>

<button class="cartBtn" onclick="openCart()">
🛒 Cart <span id="cartCount">0</span>
</button>

</header>

<div class="banner">
<div>
<h1>Premium Shopping Store</h1>
<p>Best Deals On Electronics & Fashion</p>
</div>
</div>

<div class="products">

<h2>Products</h2>

<div id="productGrid" class="productGrid"></div>

</div>

<!-- CART -->

<div id="cartOverlay" class="overlay">

<div class="cartPanel">

<div class="panelHeader">
<h2>Your Cart</h2>
<button onclick="closeCart()">✖</button>
</div>

<div id="cartItems"></div>

<div class="cartTotal">
Total :
₹<span id="totalPrice">0</span>
</div>

<button class="checkout">
Checkout
</button>

</div>

</div>

<footer>
© Amazon Style Store
</footer>

<script src="script.js"></script>

</body>
</html>
