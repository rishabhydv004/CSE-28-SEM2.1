<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Manipulation Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1 id="mainHeading">Welcome to JavaScript Lab</h1>
        
        <input type="text" id="textInput" placeholder="Enter new heading text">
        
        <div class="button-container">
            <button id="btnChangeHeading">Change Heading</button>
            <button id="btnChangeBg">Change Background</button>
            <button id="btnIncreaseFont">Increase Font Size</button>
            <button id="btnTogglePara">Show/Hide Paragraph</button>
            <button id="btnReset">Reset</button>
        </div>

        <p id="samplePara">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
